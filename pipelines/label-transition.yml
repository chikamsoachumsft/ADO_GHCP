# Pipeline: Label-Driven Requirement Decomposition
#
# Triggered when a work item in ItronGlobalReqs gets labeled "Done".
# Reads the work item type and runs the appropriate generator:
#   Requirement (MRS)      → creates System Requirement
#   System Requirement     → creates SubSystem Requirements per CI team
#   SubSystem Requirement  → creates Features + User Stories
#
# Setup:
#   1. Create an Incoming Webhook service connection named "ItronLabelDone"
#   2. Create an ADO Service Hook:
#      - Event: Work item updated (filter: tag contains "Done")
#      - Action: Trigger incoming webhook "ItronLabelDone"
#   3. Add GITHUB_TOKEN as a pipeline variable (secret) for AI model access

trigger: none
pr: none

resources:
  repositories:
    - repository: agents
      type: github
      name: chikamsoachumsft/ADO_GHCP
      ref: refs/heads/master
      endpoint: GitHub-ADO-GHCP
  webhooks:
    - webhook: ItronLabelDone
      connection: ItronLabelDone

pool:
  vmImage: ubuntu-latest

variables:
  - group: ItronSecrets

steps:
  - checkout: agents

  - task: NodeTool@0
    displayName: "Install Node.js 20"
    inputs:
      versionSpec: "20.x"

  - script: |
      cd src
      npm ci
      npm run build
    displayName: "Install dependencies and build"

  - script: |
      cd src
      node dist/index.js --work-item-id ${{ parameters.ItronLabelDone.resource.workItemId }} --event-type label-done
    displayName: "Run requirement decomposition"
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      GITHUB_TOKEN: $(GITHUB_TOKEN)
      ADO_ORG: canayorachu
      ADO_PROJECT: ItronGlobalReqs
